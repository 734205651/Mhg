<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>النظام الإعلامي ٢٠٢٦ – مستشفى البرج</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cairo',sans-serif;direction:rtl;background:#eef2fb;min-height:100vh;}

/* ═══ LOGIN ═══ */
#pg-login{min-height:100vh;background:linear-gradient(160deg,#fff 50%,#fde8e8 80%,#deeafc 100%);display:flex;align-items:center;justify-content:center;padding:16px;}
#pg-app{display:none;}

.login-card{
  background:#fff;border-radius:22px;padding:28px 26px;
  width:100%;max-width:360px;text-align:center;
  box-shadow:0 6px 32px rgba(183,28,28,.12);
  border-top:5px solid #c0392b;
}
.login-card img.logo{width:82px;height:82px;border-radius:14px;margin-bottom:14px;
  border:2px solid #ffe0e0;object-fit:contain;}
.login-card h2{font-size:20px;font-weight:900;color:#b71c1c;margin-bottom:3px;}
.login-card p{font-size:11px;color:#aaa;margin-bottom:18px;}
.lf{margin-bottom:11px;text-align:right;}
.lf label{font-size:11.5px;font-weight:700;color:#555;display:block;margin-bottom:4px;}
.lf input{width:100%;padding:10px 13px;border:1.5px solid #ddd;border-radius:10px;
  font-family:'Cairo',sans-serif;font-size:13px;color:#333;outline:none;background:#fafafa;}
.lf input:focus{border-color:#c0392b;}
.lerr{color:#c0392b;font-size:11px;font-weight:700;margin-bottom:8px;display:none;text-align:center;}
.login-btns{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:14px;}
.btn-main{background:linear-gradient(135deg,#c0392b,#e53935);color:#fff;
  border:none;border-radius:25px;padding:11px 44px;
  font-family:'Cairo',sans-serif;font-size:14px;font-weight:900;
  cursor:pointer;box-shadow:0 3px 12px rgba(192,57,43,.3);}
.btn-main:hover{opacity:.9;}
.btn-lnk{background:none;border:none;color:#c0392b;font-family:'Cairo',sans-serif;
  font-size:11px;cursor:pointer;text-decoration:underline;padding:2px;}
.login-hint{font-size:10px;color:#bbb;margin-top:10px;line-height:1.8;}
.reg-box,.forgot-box{display:none;}

/* ═══ APP ═══ */
#app-header{
  background:linear-gradient(135deg,#b71c1c 0%,#7b1717 40%,#0d1e3a 100%);
  border-bottom:3px solid #e53935;
  position:sticky;top:0;z-index:500;width:100%;
}
.hd-inner{display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;gap:6px;flex-wrap:nowrap;}
@media(max-width:600px){
  .hd-logo h1{font-size:10px;}
  .hd-logo p{display:none;}
  .hd-logo img{width:32px;height:32px;}
  .hd-right .hd-stat-box{display:none;}
  .hd-btn{padding:5px 7px;font-size:10px;}
}
.hd-logo{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.hd-logo img{width:38px;height:38px;border-radius:9px;border:2px solid rgba(255,255,255,.2);
  background:#fff;object-fit:contain;}
.hd-logo h1{font-size:12px;font-weight:900;color:#fff;line-height:1.3;}
.hd-logo p{font-size:9px;color:rgba(255,255,255,.4);}
.hd-right{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.hd-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  border-radius:18px;padding:4px 11px;display:flex;align-items:center;gap:5px;}
.hd-chip span{font-size:11px;font-weight:700;color:#fff;}
.rtag{font-size:9px;padding:2px 7px;border-radius:6px;font-weight:700;}
.rtag.admin{background:#e53935;color:#fff;}
.rtag.member{background:#00b894;color:#fff;}
.hd-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.7);border-radius:7px;padding:5px 10px;
  font-family:'Cairo',sans-serif;font-size:11px;cursor:pointer;}
.hd-btn:hover{background:rgba(255,255,255,.15);color:#fff;}

/* ═══ TABS ═══ */
#app-tabs{
  background:#0a1f4a;width:100%;
  border-bottom:2px solid rgba(255,255,255,.07);
  position:sticky;top:57px;z-index:499;
  overflow-x:auto;display:flex;
}
#app-tabs::-webkit-scrollbar{display:none;}
.tab-btn{background:none;border:none;cursor:pointer;
  font-family:'Cairo',sans-serif;font-size:10.5px;font-weight:600;
  color:rgba(255,255,255,.4);padding:9px 12px;
  border-bottom:3px solid transparent;white-space:nowrap;
  flex-shrink:0;transition:all .18s;}
.tab-btn:hover{color:rgba(255,255,255,.75);}
.tab-btn.on{color:#fff;border-bottom-color:#e53935;background:rgba(229,57,53,.12);}

/* ═══ CONTENT ═══ */
#app-body{padding:14px 12px 60px;width:100%;}

/* CARDS */
.card{background:#fff;border-radius:14px;
  box-shadow:0 3px 16px rgba(7,18,36,.08);padding:18px;margin-bottom:14px;}

/* NAV GRID */
.nav-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.nav-card{background:#fff;border:1.5px solid #eaeff8;border-radius:16px;
  padding:16px 10px;text-align:center;cursor:pointer;
  transition:all .2s;box-shadow:0 2px 10px rgba(7,18,36,.06);
  font-family:'Cairo',sans-serif;border:none;width:100%;}
.nav-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(7,18,36,.13);}
.nav-icon{width:48px;height:48px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;margin:0 auto 9px;}
.nav-label{font-size:12px;font-weight:900;color:#0a1628;margin-bottom:3px;}
.nav-sub{font-size:10px;color:#8295b5;line-height:1.4;}
.nav-bar{height:3px;border-radius:2px;width:24px;margin:6px auto 0;}

/* HERO BANNER */
.hero{background:linear-gradient(135deg,#b71c1c 0%,#7b1717 40%,#0d2060 100%);
  border-radius:18px;padding:22px;margin-bottom:16px;color:#fff;overflow:hidden;position:relative;}
.hero::before{content:'';position:absolute;top:-30px;left:-30px;
  width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.04);}
.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px;}
.hero-stat{background:rgba(255,255,255,.12);border-radius:10px;padding:9px 6px;text-align:center;}
.hero-stat-n{font-size:20px;font-weight:900;}
.hero-stat-l{font-size:9.5px;opacity:.65;}

/* TABLES */
table{width:100%;border-collapse:collapse;}
thead tr{background:linear-gradient(90deg,#7b1717,#0d1e3a);}
th{font-size:10.5px;font-weight:700;color:rgba(255,255,255,.85);
  padding:9px 10px;text-align:right;white-space:nowrap;}
tbody tr{border-bottom:1px solid #eaeff8;transition:background .12s;}
tbody tr:hover{background:#f5f8ff;}
td{font-size:11.5px;padding:8px 10px;vertical-align:middle;}
.tw{background:#fff;border-radius:14px;overflow:hidden;
  box-shadow:0 3px 16px rgba(7,18,36,.07);}
.tw-head{display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;border-bottom:1.5px solid #eaeff8;}

/* FORMS */
input,select,textarea{
  font-family:'Cairo',sans-serif;font-size:12.5px;
  border:1.5px solid #dae2f0;border-radius:9px;
  padding:8px 11px;background:#fff;color:#0a1628;
  outline:none;direction:rtl;width:100%;}
input:focus,select:focus,textarea:focus{
  border-color:#1565c0;box-shadow:0 0 0 3px rgba(21,101,192,.08);}
textarea{resize:vertical;min-height:68px;}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.fg label{font-size:11px;font-weight:700;color:#8295b5;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.full{grid-column:1/-1;}

/* BUTTONS */
.btn{font-family:'Cairo',sans-serif;font-size:11.5px;font-weight:700;
  padding:7px 14px;border-radius:8px;border:none;cursor:pointer;
  transition:all .18s;display:inline-flex;align-items:center;gap:5px;}
.bp{background:#1565c0;color:#fff;}.bp:hover{background:#0d47a1;}
.br{background:#c0392b;color:#fff;}.br:hover{background:#a93226;}
.bg{background:#00b894;color:#fff;}
.bo{background:#e65100;color:#fff;}
.bw{background:#25d366;color:#fff;}
.bk{background:none;border:1.5px solid #dae2f0;color:#0a1628;}
.bk:hover{border-color:#1565c0;color:#1565c0;}
.sm{padding:5px 10px;font-size:10.5px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:10px;
  font-weight:700;padding:2px 8px;border-radius:11px;gap:3px;}
.bg2{background:#e6f9f0;color:#00834d;}.by2{background:#fef6e0;color:#a06000;}
.br2{background:#ffe8e8;color:#922b21;}.bb2{background:#e8f0fe;color:#1a4a8a;}
.bp2{background:#f0eaff;color:#5c3eaa;}.bm2{background:#f0f2f8;color:#8295b5;}
.bo2{background:#fff0e6;color:#b85000;}

/* MISC */
.sec-title{font-size:15px;font-weight:900;color:#0a1628;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
  padding-bottom:8px;border-bottom:1.5px solid #f0f3fa;}
.sec-title::before{content:'';width:4px;height:18px;
  background:linear-gradient(#c0392b,#1565c0);border-radius:3px;flex-shrink:0;}
.prog{background:#e4ecf7;border-radius:6px;overflow:hidden;height:8px;}
.prog-f{height:100%;border-radius:6px;transition:width 1s;}
.mtabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px;}
.mtab{padding:5px 12px;border-radius:15px;border:1.5px solid #dae2f0;
  background:#fff;font-family:'Cairo',sans-serif;font-size:11px;
  font-weight:700;cursor:pointer;color:#8295b5;transition:all .16s;}
.mtab:hover{border-color:#c0392b;color:#c0392b;}
.mtab.on{background:linear-gradient(135deg,#b71c1c,#c0392b);color:#fff;border-color:#c0392b;}
.mtab.has{border-color:#00b894;color:#00834d;}
.ptype-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.ptb{padding:5px 12px;border-radius:14px;border:2px solid;
  font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;cursor:pointer;}
.ptb.pl{border-color:#1565c0;color:#1565c0;background:rgba(21,101,192,.06);}
.ptb.ur{border-color:#e65100;color:#e65100;background:rgba(230,81,0,.06);}
.ptb.em{border-color:#c0392b;color:#c0392b;background:rgba(192,57,43,.06);}
.ptb.on.pl{background:#1565c0;color:#fff;}
.ptb.on.ur{background:#e65100;color:#fff;}
.ptb.on.em{background:#c0392b;color:#fff;}
.td-date{background:linear-gradient(135deg,#b71c1c,#1565c0);color:#fff;
  border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700;
  display:inline-block;min-width:36px;text-align:center;}
.done-cb{width:15px;height:15px;cursor:pointer;accent-color:#00b894;}
tbody tr.done-r{background:linear-gradient(90deg,#f0fff8,#fff);}
tbody tr.urg-r{background:#fff8f0;border-right:3px solid #e65100;}
tbody tr.emg-r{background:#fff5f5;border-right:3px solid #c0392b;}
.ib{width:24px;height:24px;border-radius:6px;border:1.5px solid #dae2f0;
  background:none;cursor:pointer;display:inline-flex;align-items:center;
  justify-content:center;font-size:12px;}
.ib:hover{border-color:#1565c0;background:#eef4ff;}
.ib.del:hover{border-color:#c0392b;background:#fff5f5;}
.filters{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
.filters input,.filters select{font-size:11.5px;padding:6px 9px;width:auto;}
.swrap{position:relative;}
.swrap input{padding-right:26px;}
.swrap::before{content:'🔍';position:absolute;right:8px;top:50%;
  transform:translateY(-50%);font-size:10px;pointer-events:none;}
.pg{display:flex;gap:4px;justify-content:center;margin-top:10px;}
.pgb{width:28px;height:28px;border-radius:6px;border:1.5px solid #dae2f0;
  background:#fff;cursor:pointer;font-family:'Cairo',sans-serif;font-size:12px;}
.pgb:hover,.pgb.on{background:#1565c0;color:#fff;border-color:#1565c0;}
.mo{display:none;position:fixed;inset:0;background:rgba(7,18,36,.7);
  z-index:1000;align-items:center;justify-content:center;padding:14px;}
.mo.open{display:flex;}
.modal{background:#fff;border-radius:18px;width:100%;max-width:560px;
  max-height:92vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(7,18,36,.4);
  animation:mIn .25s cubic-bezier(.34,1.56,.64,1);}
.modal.wide{max-width:760px;}
@media(max-width:600px){
  .mo{padding:0;align-items:flex-end;}
  .modal,.modal.wide{max-width:100%;width:100%;border-radius:20px 20px 0 0;max-height:95vh;}
  .mh{padding:14px 16px 11px;}
  .mb{padding:12px 16px;}
  .mf{padding:10px 16px 24px;}
}
@keyframes mIn{from{transform:scale(.88) translateY(20px);opacity:0}to{transform:scale(1);opacity:1}}
.mh{padding:14px 20px 12px;border-bottom:1.5px solid #eaeff8;
  display:flex;align-items:center;justify-content:space-between;}
.mh h2{font-size:14px;font-weight:900;color:#0a1628;}
.mcl{width:28px;height:28px;border-radius:7px;background:#f2f5fb;
  border:none;cursor:pointer;font-size:15px;color:#8295b5;
  display:flex;align-items:center;justify-content:center;}
.mcl:hover{background:#ffe0e0;color:#c0392b;}
.mb{padding:14px 20px;}
.mf{padding:10px 20px 16px;display:flex;gap:8px;justify-content:flex-end;
  border-top:1.5px solid #eaeff8;}
.ex-card{background:#fff;border-radius:14px;padding:16px;
  box-shadow:0 3px 14px rgba(7,18,36,.07);border-right:4px solid #f0a500;margin-bottom:10px;}
.ex-card.approved{border-right-color:#00b894;}
.ex-card.rejected{border-right-color:#c0392b;}
.prop-card{background:#fff;border-radius:14px;padding:15px;
  box-shadow:0 3px 14px rgba(7,18,36,.07);border-right:4px solid #6c5ce7;margin-bottom:10px;}
.meet-hdr{background:linear-gradient(135deg,#b71c1c,#1565c0);
  border-radius:14px;padding:20px;color:#fff;margin-bottom:16px;}
.meet-hdr h3{font-size:15px;font-weight:900;margin-bottom:5px;}
.meet-meta{display:flex;gap:11px;margin-top:11px;flex-wrap:wrap;}
.meet-mi{background:rgba(255,255,255,.12);border-radius:8px;padding:6px 12px;text-align:center;}
.meet-mn{font-size:15px;font-weight:900;color:#ffeb3b;}
.meet-ml{font-size:9.5px;opacity:.55;}
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;}
.team-card{background:#fff;border-radius:14px;padding:18px;
  box-shadow:0 3px 14px rgba(7,18,36,.07);text-align:center;}
.t-av{width:54px;height:54px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;margin:0 auto 10px;}
.notif-item{background:#fff;border-radius:11px;padding:11px 14px;
  box-shadow:0 3px 14px rgba(7,18,36,.07);
  display:flex;align-items:center;gap:11px;
  border-right:4px solid #25d366;margin-bottom:7px;}
.cbar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.cbar-l{font-size:11px;font-weight:600;min-width:80px;text-align:right;}
.cbar-t{flex:1;height:15px;background:#e4ecf7;border-radius:4px;overflow:hidden;}
.cbar-f{height:100%;border-radius:4px;transition:width 1.2s;}
.cbar-v{font-size:11px;font-weight:700;color:#0a1628;min-width:30px;}
.rep-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.rep-card{background:#fff;border-radius:14px;padding:16px;
  box-shadow:0 3px 14px rgba(7,18,36,.07);}
.rep-card h3{font-size:12.5px;font-weight:700;color:#0a1628;
  margin-bottom:11px;padding-bottom:8px;border-bottom:1.5px solid #eaeff8;}
.soc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.soc-card{background:#fff;border-radius:14px;padding:14px;
  box-shadow:0 3px 14px rgba(7,18,36,.07);border-top:4px solid transparent;text-align:center;}
.ai-res{background:linear-gradient(135deg,#f0f7ff,#fff);
  border:1.5px solid #c5d9f5;border-radius:12px;padding:14px;
  margin-top:11px;font-size:12.5px;line-height:2;white-space:pre-wrap;}
.ai-acts{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.vbtn{width:64px;height:64px;border-radius:50%;
  background:linear-gradient(135deg,#1565c0,#0d47a1);
  color:#fff;border:none;cursor:pointer;font-size:24px;
  display:flex;align-items:center;justify-content:center;margin:0 auto;
  box-shadow:0 5px 16px rgba(21,101,192,.3);}
.vbtn.rec{background:linear-gradient(135deg,#c0392b,#b71c1c);
  animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 5px 16px rgba(192,57,43,.3)}
  50%{box-shadow:0 5px 28px rgba(192,57,43,.55)}}
.vt{background:#f5f8ff;border-radius:10px;padding:11px;
  margin-top:11px;min-height:50px;font-size:12.5px;line-height:1.8;
  border:1.5px solid #dae2f0;}
.fz{border:2px dashed #dae2f0;border-radius:11px;padding:18px;
  text-align:center;cursor:pointer;background:#fafcff;}
.fz:hover{border-color:#1565c0;background:#f0f7ff;}
.fi{background:#f2f5fb;border-radius:7px;padding:7px 11px;
  display:flex;align-items:center;gap:8px;margin-top:6px;font-size:11.5px;}
.fi-nm{flex:1;font-weight:600;}
.fi-sz{color:#8295b5;font-size:10px;}
.chat-wrap{height:230px;overflow-y:auto;background:#f5f8ff;
  border-radius:10px;padding:10px;margin-bottom:9px;
  display:flex;flex-direction:column;gap:7px;}
.chat-msg{max-width:74%;padding:7px 11px;border-radius:12px;font-size:12px;line-height:1.6;}
.chat-msg.me{background:#1565c0;color:#fff;align-self:flex-end;}
.chat-msg.ot{background:#fff;color:#0a1628;align-self:flex-start;
  box-shadow:0 2px 7px rgba(0,0,0,.07);}
.chat-msg .nm{font-size:9.5px;opacity:.65;margin-bottom:2px;font-weight:700;}
.chat-in{display:flex;gap:6px;}
.chat-in input{flex:1;}
.toast{position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(100px);
  background:#0a1628;color:#fff;padding:10px 20px;border-radius:12px;
  font-size:12.5px;font-weight:600;z-index:9999;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;gap:7px;max-width:88vw;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{background:#00b894;}.toast.er{background:#c0392b;}
.toast.wa{background:#25d366;}.toast.wn{background:#e65100;}

@media(max-width:700px){
  .nav-grid{grid-template-columns:repeat(2,1fr);}
  .soc-grid{grid-template-columns:1fr 1fr;}
  .team-grid{grid-template-columns:1fr 1fr;}
  .form-grid{grid-template-columns:1fr;}
  .rep-grid{grid-template-columns:1fr;}
  .hero-stats{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:460px){
  table{display:block;overflow-x:auto;}
}
@media(max-width:600px){
  /* Prevent iOS zoom on input focus */
  input,select,textarea{font-size:16px!important;}
  /* Better touch targets */
  .btn{min-height:40px;padding:8px 14px;}
  .tab-btn{padding:10px 10px;font-size:10px;}
  /* Full width buttons in modals */
  .mf{flex-direction:column;}
  .mf .btn{width:100%;justify-content:center;}
  /* Better form spacing */
  .fg{margin-bottom:13px;}
  /* Nav grid 2 cols on small */
  .nav-grid{grid-template-columns:1fr 1fr;}
  .soc-grid{grid-template-columns:1fr 1fr;}
  .team-grid{grid-template-columns:1fr 1fr;}
  .rep-grid{grid-template-columns:1fr;}
  .hero-stats{grid-template-columns:repeat(2,1fr);}
}

</style>
</head>
<body>

<!-- LOGIN -->

async function loadCloud(){
  if(!cloudReady)return false;
  try{
    var res=await sbClient.from('app_state').select('data').eq('id',STATE_ID).maybeSingle();
    if(res.error){console.error('Load error',res.error);return false;}
    if(res.data&&res.data.data){applyState(res.data.data);return true;}
    return false;
  }catch(e){console.error('Load exception',e);return false;}
}

async function saveCloud(){
  if(!cloudReady)return false;
  try{
    var res=await sbClient.from('app_state').upsert({id:STATE_ID,data:getState(),updated_at:new Date().toISOString()});
    if(res.error){console.error('Save error',res.error);return false;}
    return true;
  }catch(e){console.error('Save exception',e);return false;}
}

function getFil(){

async function genAI(){
  const prompt=g('aiprompt')?.value.trim(),type=g('aitype')?.value;
  const tl={'fb':'منشور فيسبوك','ig':'كابشن انستقرام','wa':'رسالة واتساب','yt':'وصف يوتيوب'};
  const btn=g('genbtn');if(btn){btn.textContent='⏳...';btn.disabled=true;}
  let mc=[];
  if(uploadedImg){try{const d=await new Promise((res,rej)=>{const r=new FileReader();r.onload=ev=>res(ev.target.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(uploadedImg);});mc.push({type:'image',source:{type:'base64',media_type:uploadedImg.type||'image/jpeg',data:d}});mc.push({type:'text',text:`استخرج المحتوى من هذه الصورة وحوّلها إلى ${tl[type]} لـ${H.name}. سياسة: ${H.policy}. ${prompt?'تعليمات: '+prompt:''}. اكتب المنشور فقط بالعربية مع هاشتاقات.`});}catch(e){mc=[{type:'text',text:`اكتب ${tl[type]} لـ${H.name}. ${prompt||''}`}];}}
  else mc=[{type:'text',text:`اكتب ${tl[type]} لـ${H.name}.\n${H.policy}\n${prompt||'اكتب منشوراً طبياً'}\nبالعربية مع هاشتاقات.`}];
  try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:[{role:'user',content:mc}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);const txt=d.content?.map(c=>c.text||'').join('')||'حدث خطأ.';if(g('aitxt'))g('aitxt').textContent=txt;if(g('aiout'))g('aiout').style.display='block';toast('✅ تم توليد المحتوى','ok');}catch(e){if(g('aitxt'))g('aitxt').textContent='⚠️ '+e.message;if(g('aiout'))g('aiout').style.display='block';toast('❌ خطأ','er');}

async function genWeb(){
